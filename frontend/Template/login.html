<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rust Manufacturing</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body>
   
  <div class="container-fluid vh-100">
    <div class="row h-100">
      <div class="col-md-4 bg-light d-flex align-items-center justify-content-center text-center">
        <div>
        <h1 class="display-6">Rust Manufacturing</h1>
        <p class="lead mt-3">podemos colocar algo da loja</p>
        
        </div>
      </div>

      <div class="col-md-8 d-flex align-items-center justify-content-center">
        <div class="p-5 border rounded shadow-lg bg-white" style="max-width: 400px; width: 100%;">
          <form action="#" method="post">
            <h2 class="h4 mb-4 text-center">Login</h2>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
              <label for="senha" class="form-label">Senha</label>
              <input type="password" class="form-control" id="senha" required>
            </div>
            <div class="d-grid gap-2 mb-3">
              <button type="submit" class="btn btn-success">Entrar</button>
            </div>
            <div class="text-center">
              <a href="cadastro.html" class="link-primary">Esqueci minha senha</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
